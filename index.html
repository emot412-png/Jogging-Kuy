<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>FitTrack</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0B1320; color: #E2E8F0; font-family: 'Inter', system-ui, sans-serif; max-width: 430px; margin: 0 auto; min-height: 100vh; }
  .screen { display: none; padding-bottom: 80px; }
  .screen.active { display: block; }
  .header { padding: 20px 20px 12px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: #A3E635; }
  .badge { font-size: 11px; border-radius: 20px; padding: 3px 10px; font-weight: 600; background: rgba(163,230,53,0.15); color: #A3E635; }
  .badge.orange { background: rgba(251,146,60,0.15); color: #FB923C; }
  .badge.red { background: rgba(239,68,68,0.15); color: #EF4444; }
  .card { background: #151F2E; border-radius: 16px; padding: 18px; margin: 0 16px 14px; }
  .stat-row { display: flex; gap: 10px; margin: 0 16px 14px; }
  .stat-card { flex: 1; background: #151F2E; border-radius: 14px; padding: 14px 12px; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 800; color: #A3E635; line-height: 1.1; }
  .stat-label { font-size: 11px; color: #64748B; margin-top: 4px; font-weight: 500; }
  .section-title { font-size: 13px; font-weight: 700; color: #64748B; letter-spacing: 1px; text-transform: uppercase; padding: 0 20px; margin-bottom: 10px; }
  .type-row { display: flex; gap: 10px; padding: 0 16px; margin-bottom: 16px; }
  .type-btn { flex: 1; padding: 12px 8px; border-radius: 12px; border: 2px solid transparent; background: #1E2D3F; color: #94A3B8; cursor: pointer; font-weight: 700; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.2s; }
  .type-btn.active-run { border-color: #A3E635; background: rgba(163,230,53,0.1); color: #A3E635; }
  .type-btn.active-bike { border-color: #38BDF8; background: rgba(56,189,248,0.1); color: #38BDF8; }
  .type-btn.active-walk { border-color: #FB923C; background: rgba(251,146,60,0.1); color: #FB923C; }
  .type-icon { font-size: 24px; }
  .start-btn { display: block; width: calc(100% - 32px); margin: 0 16px 20px; padding: 16px; border-radius: 14px; border: none; background: linear-gradient(135deg, #A3E635, #65A30D); color: #0B1320; font-weight: 800; font-size: 17px; cursor: pointer; }
  .timer-ring { width: 160px; height: 160px; border-radius: 50%; border: 4px solid #1E2D3F; display: flex; align-items: center; justify-content: center; flex-direction: column; margin: 10px auto 20px; transition: box-shadow 0.5s ease; }
  .timer-ring.active { border-color: #A3E635; box-shadow: 0 0 30px rgba(163,230,53,0.25); }
  .timer-num { font-size: 38px; font-weight: 800; color: #A3E635; letter-spacing: -2px; font-variant-numeric: tabular-nums; }
  .timer-sub { font-size: 12px; color: #64748B; font-weight: 600; }
  .ctrl-row { display: flex; gap: 12px; padding: 0 16px; margin-bottom: 16px; }
  .ctrl-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; background: #1E2D3F; color: #E2E8F0; font-weight: 700; font-size: 14px; cursor: pointer; }
  .ctrl-btn.pause { background: rgba(251,146,60,0.1); color: #FB923C; }
  .ctrl-btn.resume { background: rgba(163,230,53,0.1); color: #A3E635; }
  .ctrl-btn.stop { background: rgba(239,68,68,0.1); color: #EF4444; }
  #map, .replay-map { width: 100%; height: 220px; border-radius: 14px; overflow: hidden; z-index: 0; }
  .map-label { font-size: 12px; color: #64748B; margin-bottom: 8px; font-weight: 600; }
  .act-item { background: #151F2E; border-radius: 14px; padding: 14px 16px; margin: 0 16px 10px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
  .act-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .act-info { flex: 1; }
  .act-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
  .act-date { font-size: 12px; color: #64748B; }
  .act-stats { text-align: right; }
  .act-km { font-weight: 800; font-size: 15px; }
  .act-time { font-size: 12px; color: #64748B; }
  .act-arrow { color: #475569; font-size: 16px; }
  .nav-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: #0F1923; border-top: 1px solid #1E2D3F; display: flex; padding: 10px 0 16px; }
  .nav-btn { flex: 1; background: none; border: none; color: #475569; cursor: pointer; font-size: 11px; font-weight: 500; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px 0; }
  .nav-btn.active { color: #A3E635; font-weight: 700; }
  .nav-icon { font-size: 20px; }
  .empty { text-align: center; padding: 60px 20px; color: #475569; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .summary-card { background: linear-gradient(135deg, #0F2027, #151F2E); border: 1px solid #1E3A2E; border-radius: 16px; padding: 18px; margin: 0 16px 14px; }
  .summary-row { display: flex; }
  .summary-item { flex: 1; text-align: center; }
  .summary-item:not(:last-child) { border-right: 1px solid #1E2D3F; }
  .summary-val { font-size: 20px; font-weight: 800; color: #A3E635; }
  .summary-lbl { font-size: 11px; color: #64748B; margin-top: 2px; }
  .back-btn { background: none; border: none; color: #94A3B8; cursor: pointer; font-size: 20px; }
  .del-btn { background: none; border: none; color: #EF4444; cursor: pointer; font-size: 13px; font-weight: 600; }
  .detail-title { font-weight: 700; font-size: 16px; }
  .see-all { background: none; border: none; color: #A3E635; font-size: 12px; font-weight: 600; cursor: pointer; }
  .recent-header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; margin-bottom: 10px; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="header">
    <span class="logo">FitTrack</span>
    <span class="badge">OFFLINE ✓</span>
  </div>
  <div class="summary-card">
    <div class="section-title" style="padding:0;margin-bottom:12px">TOTAL STATISTIK</div>
    <div class="summary-row">
      <div class="summary-item"><div class="summary-val" id="total-km">0.0</div><div class="summary-lbl">KM Total</div></div>
      <div class="summary-item"><div class="summary-val" id="total-cal">0</div><div class="summary-lbl">Kalori</div></div>
      <div class="summary-item"><div class="summary-val" id="total-time">00:00</div><div class="summary-lbl">Waktu</div></div>
    </div>
  </div>
  <div class="section-title">Pilih Olahraga</div>
  <div class="type-row">
    <button class="type-btn active-run" onclick="selectType('run',this)"><span class="type-icon">🏃</span>Lari</button>
    <button class="type-btn" onclick="selectType('bike',this)"><span class="type-icon">🚴</span>Sepeda</button>
    <button class="type-btn" onclick="selectType('walk',this)"><span class="type-icon">🚶</span>Jalan</button>
  </div>
  <button class="start-btn" id="start-btn" onclick="startTracking()">▶ Mulai Lari</button>
  <div id="recent-section" style="display:none">
    <div class="recent-header">
      <div class="section-title" style="padding:0;margin:0">Aktivitas Terbaru</div>
      <button class="see-all" onclick="showScreen('history')">Lihat Semua →</button>
    </div>
    <div id="recent-list"></div>
  </div>
  <div id="home-empty" class="empty">
    <div class="empty-icon">🏃</div>
    <div style="font-weight:600">Yuk mulai olahraga!</div>
    <div style="font-size:13px;margin-top:4px">Data tersimpan offline</div>
  </div>
  <nav class="nav-bar">
    <button class="nav-btn active" onclick="showScreen('home')"><span class="nav-icon">🏠</span>Home</button>
    <button class="nav-btn" onclick="showScreen('history')"><span class="nav-icon">📋</span>Riwayat</button>
  </nav>
</div>

<!-- TRACK -->
<div id="track" class="screen">
  <div class="header">
    <span class="logo" id="track-title">🏃 Lari</span>
    <span class="badge" id="gps-badge">📍 Mencari GPS...</span>
  </div>
  <div class="timer-ring" id="timer-ring">
    <div class="timer-num" id="timer-display">00:00</div>
    <div class="timer-sub">WAKTU</div>
  </div>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-val" id="live-km">0.00</div><div class="stat-label">KM</div></div>
    <div class="stat-card"><div class="stat-val" id="live-pace">--:--</div><div class="stat-label">PACE /KM</div></div>
    <div class="stat-card"><div class="stat-val" id="live-cal">0</div><div class="stat-label">KALORI</div></div>
  </div>
  <div style="margin:0 16px 16px">
    <div class="map-label">PETA LIVE</div>
    <div id="map"></div>
  </div>
  <div class="ctrl-row">
    <button class="ctrl-btn pause" id="pause-btn" onclick="togglePause()">⏸ Jeda</button>
    <button class="ctrl-btn stop" onclick="stopTracking()">⏹ Selesai</button>
    <button class="ctrl-btn" onclick="cancelTracking()">✕ Batal</button>
  </div>
</div>

<!-- HISTORY -->
<div id="history" class="screen">
  <div class="header">
    <span class="logo">Riwayat</span>
    <span class="badge" id="history-count">0 sesi</span>
  </div>
  <div id="history-list"></div>
  <div id="history-empty" class="empty" style="display:none">
    <div class="empty-icon">🏁</div>
    <div style="font-weight:700;font-size:16px;margin-bottom:8px">Belum ada aktivitas</div>
    <div style="font-size:13px">Mulai olahraga pertamamu!</div>
  </div>
  <nav class="nav-bar">
    <button class="nav-btn" onclick="showScreen('home')"><span class="nav-icon">🏠</span>Home</button>
    <button class="nav-btn active"><span class="nav-icon">📋</span>Riwayat</button>
  </nav>
</div>

<!-- DETAIL -->
<div id="detail" class="screen">
  <div class="header">
    <button class="back-btn" onclick="showScreen('history')">←</button>
    <span class="detail-title" id="detail-title">Detail</span>
    <button class="del-btn" id="del-btn">Hapus</button>
  </div>
  <div class="card" id="detail-header" style="text-align:center"></div>
  <div class="stat-row" id="detail-stats1"></div>
  <div class="stat-row" id="detail-stats2"></div>
  <div style="margin:0 16px 20px" id="detail-map-wrap">
    <div class="map-label">RUTE</div>
    <div id="detail-map" style="width:100%;height:220px;border-radius:14px;overflow:hidden"></div>
  </div>
</div>

<script>
const TYPES = {
  run:  { label: 'Lari',   icon: '🏃', color: '#A3E635', met: 9.8 },
  bike: { label: 'Sepeda', icon: '🚴', color: '#38BDF8', met: 7.5 },
  walk: { label: 'Jalan',  icon: '🚶', color: '#FB923C', met: 3.5 },
};

let activities = JSON.parse(localStorage.getItem('fittrack_v4') || '[]');
let currentType = 'run';
let elapsed = 0, distanceKm = 0;
let isTracking = false, isPaused = false;
let timerInterval = null, watchId = null;
let routePoints = [];
let liveMap = null, livePolyline = null, liveMarker = null;
let detailMapInstance = null;

function save() { localStorage.setItem('fittrack_v4', JSON.stringify(activities)); }

function fmtDur(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = s%60;
  if(h>0) return `${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}
function fmtDate(iso) { return new Date(iso).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }
function calcCal(secs, met) { return Math.round(met * 65 * (secs/3600)); }
function calcPace(secs, km) {
  if(!km) return '--:--';
  const spk = secs/km;
  return `${Math.floor(spk/60)}:${String(Math.round(spk%60)).padStart(2,'0')}`;
}
function haversine(p1, p2) {
  const R=6371, dL=((p2.lat-p1.lat)*Math.PI)/180, dG=((p2.lng-p1.lng)*Math.PI)/180;
  const a=Math.sin(dL/2)**2+Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'home') renderHome();
  if(id === 'history') renderHistory();
}

function selectType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.className = 'type-btn');
  btn.className = `type-btn active-${type}`;
  document.getElementById('start-btn').textContent = `▶ Mulai ${TYPES[type].label}`;
}

function renderHome() {
  const totalKm = activities.reduce((s,a)=>s+(a.distanceKm||0),0);
  const totalCal = activities.reduce((s,a)=>s+(a.calories||0),0);
  const totalTime = activities.reduce((s,a)=>s+(a.durationSecs||0),0);
  document.getElementById('total-km').textContent = totalKm.toFixed(1);
  document.getElementById('total-cal').textContent = totalCal.toLocaleString();
  document.getElementById('total-time').textContent = fmtDur(totalTime);

  const recentSec = document.getElementById('recent-section');
  const emptyDiv = document.getElementById('home-empty');
  if(activities.length === 0) { recentSec.style.display='none'; emptyDiv.style.display='block'; return; }
  recentSec.style.display='block'; emptyDiv.style.display='none';

  const list = document.getElementById('recent-list');
  list.innerHTML = activities.slice(0,3).map((a,i) => actItemHTML(a,i)).join('');
}

function actItemHTML(a, i) {
  const t = TYPES[a.type] || TYPES.run;
  return `<div class="act-item" onclick="showDetail(${activities.indexOf(a)})">
    <div class="act-icon" style="background:${t.color}18;border:1px solid ${t.color}30">${t.icon}</div>
    <div class="act-info"><div class="act-name">${t.label}</div><div class="act-date">${fmtDate(a.date)}</div></div>
    <div class="act-stats"><div class="act-km" style="color:${t.color}">${(a.distanceKm||0).toFixed(2)} km</div><div class="act-time">${fmtDur(a.durationSecs)}</div></div>
    <div class="act-arrow">›</div>
  </div>`;
}

function renderHistory() {
  document.getElementById('history-count').textContent = `${activities.length} sesi`;
  const list = document.getElementById('history-list');
  const empty = document.getElementById('history-empty');
  if(activities.length === 0) { list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  list.innerHTML = activities.map((a,i) => actItemHTML(a,i)).join('');
}

function showDetail(idx) {
  const a = activities[idx];
  const t = TYPES[a.type] || TYPES.run;
  document.getElementById('detail-title').textContent = `${t.icon} Detail`;
  document.getElementById('detail-header').innerHTML = `<div style="font-size:13px;color:#64748B;margin-bottom:4px">${fmtDate(a.date)}</div><div style="font-size:28px;font-weight:800;color:${t.color}">${t.label}</div>`;
  document.getElementById('detail-stats1').innerHTML = `
    <div class="stat-card"><div class="stat-val" style="color:${t.color}">${(a.distanceKm||0).toFixed(2)}</div><div class="stat-label">KM</div></div>
    <div class="stat-card"><div class="stat-val" style="color:${t.color}">${fmtDur(a.durationSecs)}</div><div class="stat-label">WAKTU</div></div>`;
  document.getElementById('detail-stats2').innerHTML = `
    <div class="stat-card"><div class="stat-val" style="color:${t.color}">${a.calories||0}</div><div class="stat-label">KALORI</div></div>
    <div class="stat-card"><div class="stat-val" style="color:${t.color}">${calcPace(a.durationSecs,a.distanceKm)}</div><div class="stat-label">PACE /KM</div></div>`;

  document.getElementById('del-btn').onclick = () => { activities.splice(idx,1); save(); showScreen('history'); };

  showScreen('detail');

  // Render detail map
  setTimeout(() => {
    if(detailMapInstance) { detailMapInstance.remove(); detailMapInstance=null; }
    const pts = a.routePoints || [];
    const wrap = document.getElementById('detail-map-wrap');
    if(pts.length < 2) { wrap.style.display='none'; return; }
    wrap.style.display='block';
    detailMapInstance = L.map('detail-map', { zoomControl:true, attributionControl:false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(detailMapInstance);
    const latlngs = pts.map(p=>[p.lat,p.lng]);
    L.polyline(latlngs,{color:t.color,weight:4}).addTo(detailMapInstance);
    L.circleMarker(latlngs[0],{radius:6,color:'#22C55E',fillColor:'#22C55E',fillOpacity:1}).addTo(detailMapInstance);
    L.circleMarker(latlngs[latlngs.length-1],{radius:6,color:'#EF4444',fillColor:'#EF4444',fillOpacity:1}).addTo(detailMapInstance);
    detailMapInstance.fitBounds(latlngs);
  }, 100);
}

function startTracking() {
  elapsed=0; distanceKm=0; routePoints=[];
  isTracking=true; isPaused=false;
  const t = TYPES[currentType];
  document.getElementById('track-title').textContent = `${t.icon} ${t.label}`;
  document.getElementById('gps-badge').textContent = '📍 Mencari GPS...';
  document.getElementById('gps-badge').className = 'badge orange';
  document.getElementById('timer-ring').className = 'timer-ring active';
  document.getElementById('timer-display').textContent = '00:00';
  document.getElementById('live-km').textContent = '0.00';
  document.getElementById('live-pace').textContent = '--:--';
  document.getElementById('live-cal').textContent = '0';
  showScreen('track');

  // Init map
  setTimeout(() => {
    if(liveMap) { liveMap.remove(); liveMap=null; livePolyline=null; liveMarker=null; }
    liveMap = L.map('map', { zoomControl:false, attributionControl:false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(liveMap);
    liveMap.setView([-6.2088, 106.8456], 16);
  }, 100);

  timerInterval = setInterval(() => {
    if(!isPaused) {
      elapsed++;
      document.getElementById('timer-display').textContent = fmtDur(elapsed);
      document.getElementById('live-cal').textContent = calcCal(elapsed, TYPES[currentType].met);
      document.getElementById('live-pace').textContent = calcPace(elapsed, distanceKm);
    }
  }, 1000);

  if(!navigator.geolocation) { document.getElementById('gps-badge').textContent='📍 GPS Tidak Ada'; document.getElementById('gps-badge').className='badge red'; return; }

  watchId = navigator.geolocation.watchPosition(pos => {
    if(isPaused) return;
    const pt = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    document.getElementById('gps-badge').textContent = '📍 GPS Aktif';
    document.getElementById('gps-badge').className = 'badge';

    if(routePoints.length > 0) {
      distanceKm += haversine(routePoints[routePoints.length-1], pt);
      document.getElementById('live-km').textContent = distanceKm.toFixed(2);
    }
    routePoints.push(pt);

    if(liveMap) {
      const latlngs = routePoints.map(p=>[p.lat,p.lng]);
      if(livePolyline) livePolyline.setLatLngs(latlngs);
      else livePolyline = L.polyline(latlngs,{color:TYPES[currentType].color,weight:4}).addTo(liveMap);

      const icon = L.divIcon({
        html:`<div style="width:14px;height:14px;background:${TYPES[currentType].color};border:3px solid white;border-radius:50%;box-shadow:0 0 8px ${TYPES[currentType].color}"></div>`,
        className:'', iconSize:[14,14]
      });
      if(liveMarker) liveMarker.setLatLng([pt.lat,pt.lng]);
      else liveMarker = L.marker([pt.lat,pt.lng],{icon}).addTo(liveMap);
      liveMap.panTo([pt.lat,pt.lng]);
    }
  }, () => {
    document.getElementById('gps-badge').textContent='📍 GPS Gagal';
    document.getElementById('gps-badge').className='badge red';
  }, { enableHighAccuracy:true, maximumAge:2000, timeout:10000 });
}

function togglePause() {
  isPaused = !isPaused;
  const btn = document.getElementById('pause-btn');
  const ring = document.getElementById('timer-ring');
  if(isPaused) { btn.textContent='▶ Lanjut'; btn.className='ctrl-btn resume'; ring.className='timer-ring'; }
  else { btn.textContent='⏸ Jeda'; btn.className='ctrl-btn pause'; ring.className='timer-ring active'; }
}

function stopTracking() {
  clearInterval(timerInterval);
  if(watchId) navigator.geolocation.clearWatch(watchId);
  const a = {
    id: Date.now(), type: currentType, date: new Date().toISOString(),
    durationSecs: elapsed, distanceKm: Math.round(distanceKm*100)/100,
    calories: calcCal(elapsed, TYPES[currentType].met),
    routePoints: [...routePoints]
  };
  activities.unshift(a); save();
  isTracking=false; isPaused=false;
  showScreen('home');
}

function cancelTracking() {
  clearInterval(timerInterval);
  if(watchId) navigator.geolocation.clearWatch(watchId);
  isTracking=false; isPaused=false;
  showScreen('home');
}

renderHome();
</script>
</body>
  </html>
